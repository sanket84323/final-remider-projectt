name: campussync
description: CampusSync - Secure Academic Management and Notification System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP Client
  dio: ^5.4.3+1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.0.0

  # Calendar
  table_calendar: ^3.1.2

  # File Handling
  file_picker: ^8.0.3
  open_filex: ^4.4.0
  cached_network_image: ^3.3.1

  # UI Utilities
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  timeago: ^3.6.1
  lottie: ^3.1.0

  # Local Storage / Offline Cache
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.0
  percent_indicator: ^4.2.4

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
